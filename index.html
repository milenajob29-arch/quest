<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поймай насекомое - конструктор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #2d5a2c;
            padding: 20px;
        }
        .main {
            max-width: 1300px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .left {
            width: 380px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .right {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        .block {
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .block h3 {
            margin-bottom: 12px;
            color: #333;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 5px;
        }
        .bug-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .bug-row input:first-child {
            width: 60px;
            text-align: center;
            font-size: 24px;
        }
        .bug-row input:nth-child(2) {
            flex: 1;
        }
        .del {
            background: #e74c3c;
            padding: 5px 10px;
        }
        .q-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #ff9800;
        }
        .q-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .preview {
            width: 100%;
            height: 450px;
            border: 2px solid #ddd;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .code {
            background: #1e1e1e;
            color: #0f0;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow: auto;
            margin: 10px 0;
            border-radius: 8px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .btn1 {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        .orange { background: #ff9800; color: white; }
        .blue { background: #2196f3; color: white; }
        .hint {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        .emoji-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 12px;
        }
        .emoji-btn {
            width: 45px;
            height: 45px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-btn:hover {
            background: #ff9800;
        }
    </style>
</head>
<body>
<div class="main">
    <h1>🐞 ПОЙМАЙ НАСЕКОМОЕ 🦋</h1>
    
    <div class="row">
        <!-- ЛЕВАЯ ПАНЕЛЬ -->
        <div class="left">
            <div class="block">
                <h3>🎯 КОГО ЛОВИМ?</h3>
                <input type="text" id="targetBug" value="🐞" style="font-size: 28px; text-align: center;">
                <div class="emoji-panel" id="targetEmojiPanel"></div>
            </div>

            <div class="block">
                <h3>🦟 ДРУГИЕ НАСЕКОМЫЕ</h3>
                <div id="bugsList"></div>
                <button onclick="addBug()">+ Добавить насекомое</button>
                <div class="emoji-panel" id="otherEmojiPanel"></div>
                <div class="hint">⚠️ При клике на них — теряешь жизнь</div>
            </div>

            <div class="block">
                <h3>❓ ВОПРОСЫ (после поимки)</h3>
                <div id="questionsList"></div>
                <button onclick="addQuestion()">+ Добавить вопрос</button>
            </div>

            <div class="block">
                <h3>⚙️ НАСТРОЙКИ</h3>
                <label>Скорость появления (сек)</label>
                <input type="range" id="speed" min="0.5" max="3" step="0.1" value="1.5" oninput="document.getElementById('speedVal').innerText=this.value+' сек'">
                <span id="speedVal">1.5 сек</span>
                
                <label style="margin-top: 10px;">Фон (цвет или картинка)</label>
                <input type="text" id="bgImage" placeholder="Ссылка на картинку (https://...)">
                <input type="color" id="bgColor" value="#87CEEB" style="margin-top: 5px;">
                
                <label style="margin-top: 10px;">Название игры</label>
                <input type="text" id="gameTitle" value="🐞 ПОЙМАЙ ЖУКА! 🐞">
            </div>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ -->
        <div class="right">
            <h3>👁️ ПРЕДПРОСМОТР</h3>
            <iframe id="previewFrame" class="preview"></iframe>
            
            <div class="btn-row">
                <button class="btn1 orange" onclick="updatePreview()">🔄 ОБНОВИТЬ</button>
                <button class="btn1 blue" onclick="copyCode()">📋 КОПИРОВАТЬ КОД</button>
            </div>
            
            <h3>📦 КОД ДЛЯ GENIALLY</h3>
            <div id="codeBox" class="code">Нажми "Обновить"</div>
            <div class="hint">✅ В Genially: Вставить → HTML-код → вставь код</div>
        </div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ==========
    let bugs = [
        { emoji: "🦟", name: "Комар" },
        { emoji: "🕷️", name: "Паук" },
        { emoji: "🐛", name: "Гусеница" }
    ];
    
    let questions = [
        { text: "Назови столицу Франции?", answer: "париж", hint: "Город любви" }
    ];
    
    // Список всех насекомых для выбора
    const allEmojis = ["🐞", "🦋", "🐝", "🦗", "🐜", "🕷️", "🦟", "🐛", "🐌", "🦂", "🐞", "🦋", "🐝", "🦗"];
    
    // ========== ОТРИСОВКА ПАНЕЛЕЙ С ЭМОДЗИ ==========
    function renderTargetEmojiPanel() {
        const panel = document.getElementById('targetEmojiPanel');
        if (!panel) return;
        panel.innerHTML = '';
        const current = document.getElementById('targetBug').value;
        
        for (let emoji of allEmojis) {
            const btn = document.createElement('div');
            btn.className = 'emoji-btn';
            btn.textContent = emoji;
            if (emoji === current) btn.style.background = '#ff9800';
            btn.onclick = function() {
                document.getElementById('targetBug').value = emoji;
                renderTargetEmojiPanel();
                updatePreview();
            };
            panel.appendChild(btn);
        }
    }
    
    function renderOtherEmojiPanel() {
        const panel = document.getElementById('otherEmojiPanel');
        if (!panel) return;
        panel.innerHTML = '';
        
        for (let emoji of allEmojis) {
            const btn = document.createElement('div');
            btn.className = 'emoji-btn';
            btn.textContent = emoji;
            btn.onclick = function() {
                bugs.push({ emoji: emoji, name: "Новое насекомое" });
                renderBugsList();
                updatePreview();
            };
            panel.appendChild(btn);
        }
    }
    
    // ========== ОТРИСОВКА СПИСКА НАСЕКОМЫХ ==========
    function renderBugsList() {
        const container = document.getElementById('bugsList');
        if (!container) return;
        container.innerHTML = '';
        
        for (let i = 0; i < bugs.length; i++) {
            const div = document.createElement('div');
            div.className = 'bug-row';
            div.innerHTML = `
                <input type="text" id="bugEmoji_${i}" value="${bugs[i].emoji}" style="width:60px;font-size:24px;">
                <input type="text" id="bugName_${i}" value="${bugs[i].name}">
                <button class="del" onclick="deleteBug(${i})">🗑️</button>
            `;
            container.appendChild(div);
        }
    }
    
    function deleteBug(index) {
        bugs.splice(index, 1);
        renderBugsList();
        updatePreview();
    }
    
    function addBug() {
        bugs.push({ emoji: "🦟", name: "Новое насекомое" });
        renderBugsList();
        updatePreview();
    }
    
    // ========== ОТРИСОВКА ВОПРОСОВ ==========
    function renderQuestionsList() {
        const container = document.getElementById('questionsList');
        if (!container) return;
        container.innerHTML = '';
        
        for (let i = 0; i < questions.length; i++) {
            const div = document.createElement('div');
            div.className = 'q-item';
            div.innerHTML = `
                <div class="q-header">
                    <b>Вопрос ${i+1}</b>
                    <button class="del" onclick="deleteQuestion(${i})">🗑️</button>
                </div>
                <label>Текст вопроса</label>
                <textarea id="qText_${i}" rows="2">${escapeHtml(questions[i].text)}</textarea>
                <label>Правильный ответ</label>
                <input type="text" id="qAnswer_${i}" value="${escapeHtml(questions[i].answer)}">
                <label>Подсказка</label>
                <input type="text" id="qHint_${i}" value="${escapeHtml(questions[i].hint)}">
            `;
            container.appendChild(div);
        }
    }
    
    function deleteQuestion(index) {
        questions.splice(index, 1);
        renderQuestionsList();
        updatePreview();
    }
    
    function addQuestion() {
        questions.push({ text: "Новый вопрос", answer: "ответ", hint: "подсказка" });
        renderQuestionsList();
        updatePreview();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;');
        });
    }
    
    // ========== СБОР ДАННЫХ ИЗ ФОРМ ==========
    function collectData() {
        // Собираем насекомых
        let newBugs = [];
        for (let i = 0; i < bugs.length; i++) {
            let emojiInput = document.getElementById(`bugEmoji_${i}`);
            let nameInput = document.getElementById(`bugName_${i}`);
            if (emojiInput && nameInput) {
                newBugs.push({
                    emoji: emojiInput.value,
                    name: nameInput.value
                });
            }
        }
        if (newBugs.length) bugs = newBugs;
        
        // Собираем вопросы
        let newQuestions = [];
        for (let i = 0; i < questions.length; i++) {
            let textInput = document.getElementById(`qText_${i}`);
            let answerInput = document.getElementById(`qAnswer_${i}`);
            let hintInput = document.getElementById(`qHint_${i}`);
            if (textInput && answerInput) {
                newQuestions.push({
                    text: textInput.value,
                    answer: answerInput.value.toLowerCase().trim(),
                    hint: hintInput ? hintInput.value : ""
                });
            }
        }
        if (newQuestions.length) questions = newQuestions;
        
        return {
            target: document.getElementById('targetBug').value,
            bugs: bugs,
            questions: questions,
            speed: parseFloat(document.getElementById('speed').value),
            bgColor: document.getElementById('bgColor').value,
            bgImage: document.getElementById('bgImage').value,
            title: document.getElementById('gameTitle').value
        };
    }
    
    // ========== ГЕНЕРАЦИЯ HTML ИГРЫ ==========
    function buildGame() {
        let data = collectData();
        
        let bgStyle = data.bgImage && data.bgImage.trim() 
            ? `url('${data.bgImage}') center/cover no-repeat` 
            : data.bgColor;
        
        return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поймай насекомое</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{background:transparent;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial;}
.game{width:100%;max-width:650px;background:${bgStyle};border-radius:40px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
.header{background:rgba(0,0,0,0.7);color:white;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.score{background:#ff9800;padding:5px 12px;border-radius:25px;font-weight:bold;}
.lives{font-size:20px;}
.reset{background:#ff9800;border:none;padding:5px 12px;border-radius:25px;cursor:pointer;color:white;}
.field{position:relative;height:450px;overflow:hidden;cursor:crosshair;}
.bug{position:absolute;font-size:55px;cursor:pointer;filter:drop-shadow(2px 2px 5px rgba(0,0,0,0.3));transition:transform 0.1s;}
.bug:active{transform:scale(0.9);}
@keyframes fly{
    0%{transform:translate(0,0);}
    25%{transform:translate(15px,-10px);}
    50%{transform:translate(-10px,12px);}
    75%{transform:translate(8px,-5px);}
    100%{transform:translate(0,0);}
}
.flying{animation:fly 3s infinite ease-in-out;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:1000;}
.modal-box{background:white;max-width:380px;width:90%;border-radius:40px;padding:25px;text-align:center;}
.qtext{background:#f5f5f5;padding:15px;border-radius:25px;margin:15px 0;font-weight:bold;}
.answer{width:100%;padding:12px;border:2px solid #ddd;border-radius:40px;margin:15px 0;text-align:center;}
.btn{background:#4caf50;color:white;border:none;padding:10px 25px;border-radius:40px;cursor:pointer;margin:5px;}
.close{background:#ff9800;}
.feedback{margin:10px 0;padding:8px;border-radius:25px;}
.good{background:#c8e6c9;color:green;}
.bad{background:#ffcdd2;color:red;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#b71c1c;color:white;padding:8px 20px;border-radius:40px;z-index:2000;animation:fade 2s forwards;}
.toast-good{background:#4caf50;}
@keyframes fade{0%{opacity:1;}70%{opacity:1;}100%{opacity:0;}}
.end{text-align:center;padding:60px 20px;}
.end h2{margin-bottom:15px;}
.end button{background:#ff9800;border:none;padding:10px 30px;border-radius:30px;cursor:pointer;margin-top:15px;}
</style>
</head>
<body>
<div class="game">
<div class="header">
<span>${escapeHtml(data.title)}</span>
<span class="score">🎯 <span id="scoreVal">0</span></span>
<span class="lives" id="livesVal">❤️❤️❤️</span>
<button class="reset" id="resetBtn">🔄 Новая</button>
</div>
<div class="field" id="field"></div>
</div>
<div id="modal" class="modal">
<div class="modal-box">
<h3>📖 ВОПРОС</h3>
<div class="qtext" id="qText">...</div>
<input type="text" id="answerInp" class="answer" placeholder="Введи ответ">
<div>
<button class="btn" id="submitBtn">✅ ОТВЕТИТЬ</button>
<button class="btn close" id="closeBtn">❌ ЗАКРЫТЬ</button>
</div>
<div id="fb" class="feedback"></div>
<div id="hint" style="font-size:12px;color:#888;">💡 Подсказка: ...</div>
</div>
</div>
<script>
const TARGET = "${escapeHtml(data.target)}";
const QUESTIONS = ${JSON.stringify(data.questions)};
const OTHER = ${JSON.stringify(data.bugs)};
const SPEED = ${data.speed * 1000};

let score = 0, lives = 3, active = true, qIndex = 0, interval = null;
let bugsList = [];

function toast(msg, good) {
    let t = document.createElement('div');
    t.className = 'toast';
    if(good) t.classList.add('toast-good');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

function updateUI() {
    document.getElementById('scoreVal').innerText = score;
    let hearts = '';
    for(let i=0;i<lives;i++) hearts += '❤️';
    for(let i=lives;i<3;i++) hearts += '🖤';
    document.getElementById('livesVal').innerText = hearts;
}

function createBug(isTarget) {
    let field = document.getElementById('field');
    let bug = document.createElement('div');
    bug.className = 'bug flying';
    
    if(isTarget) {
        bug.textContent = TARGET;
        bug.dataset.type = 'target';
    } else {
        let r = OTHER[Math.floor(Math.random() * OTHER.length)];
        bug.textContent = r.emoji;
        bug.dataset.type = 'bad';
        bug.title = r.name;
    }
    
    let w = field.clientWidth - 70;
    let h = field.clientHeight - 70;
    bug.style.left = Math.random() * Math.max(0, w) + 'px';
    bug.style.top = Math.random() * Math.max(0, h) + 'px';
    
    bug.onclick = function(e) {
        e.stopPropagation();
        if(!active) return;
        if(this.dataset.type === 'target') {
            this.remove();
            openModal();
        } else {
            this.remove();
            lives--;
            updateUI();
            toast("❌ " + (this.title || 'Не то') + "! -1 жизнь");
            if(lives <= 0) gameOver();
        }
    };
    
    field.appendChild(bug);
    
    // Прятаться через 2-4 секунды
    let hideTimeout = setTimeout(() => {
        if(bug.parentNode && active) {
            bug.style.transition = 'opacity 0.3s';
            bug.style.opacity = '0';
            setTimeout(() => { if(bug.parentNode) bug.remove(); }, 300);
        }
    }, Math.random() * 3000 + 2000);
    
    bug.hideTimeout = hideTimeout;
    
    // Удалить через 6 секунд
    setTimeout(() => {
        if(bug.parentNode) {
            if(bug.hideTimeout) clearTimeout(bug.hideTimeout);
            bug.remove();
        }
    }, 6000);
}

function spawn() {
    if(!active) return;
    let isTarget = Math.random() < 0.4;
    createBug(isTarget);
}

function openModal() {
    if(!active) return;
    if(qIndex >= QUESTIONS.length) { win(); return; }
    let q = QUESTIONS[qIndex];
    document.getElementById('qText').innerHTML = q.text;
    document.getElementById('hint').innerHTML = '💡 ' + (q.hint || 'нет');
    document.getElementById('answerInp').value = '';
    document.getElementById('fb').innerHTML = '';
    document.getElementById('modal').style.display = 'flex';
}

function check() {
    let ans = document.getElementById('answerInp').value.trim().toLowerCase();
    let q = QUESTIONS[qIndex];
    let fb = document.getElementById('fb');
    if(ans === q.answer.toLowerCase()) {
        fb.innerHTML = '✅ ВЕРНО! +10 очков';
        fb.className = 'feedback good';
        score += 10;
        updateUI();
        qIndex++;
        setTimeout(() => {
            document.getElementById('modal').style.display = 'none';
            toast("✅ +10 очков!", true);
            if(qIndex >= QUESTIONS.length) win();
        }, 800);
    } else {
        fb.innerHTML = '❌ НЕВЕРНО! Ответ "' + ans + '" неправильный';
        fb.className = 'feedback bad';
        document.getElementById('answerInp').value = '';
    }
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

function gameOver() {
    active = false;
    if(interval) clearInterval(interval);
    let field = document.getElementById('field');
    field.innerHTML = '<div class="end"><h2>💀 ИГРА ОКОНЧЕНА 💀</h2><p style="font-size:1.5rem">Счёт: ' + score + '</p><button onclick="location.reload()">🔄 Снова</button></div>';
    toast("💀 Игра окончена!");
}

function win() {
    active = false;
    if(interval) clearInterval(interval);
    let field = document.getElementById('field');
    field.innerHTML = '<div class="end"><h2>🏆 ПОБЕДА! 🏆</h2><p style="font-size:1.5rem">Счёт: ' + score + '</p><button onclick="location.reload()">🔄 Снова</button></div>';
    toast("🏆 ПОБЕДА!", true);
}

function reset() {
    score = 0; lives = 3; qIndex = 0; active = true;
    updateUI();
    document.getElementById('field').innerHTML = '';
    if(interval) clearInterval(interval);
    interval = setInterval(() => spawn(), SPEED);
}

document.getElementById('submitBtn').onclick = check;
document.getElementById('closeBtn').onclick = closeModal;
document.getElementById('resetBtn').onclick = reset;
document.getElementById('answerInp').onkeypress = (e) => { if(e.key === 'Enter') check(); };
document.getElementById('modal').onclick = (e) => { if(e.target === this) closeModal(); };

updateUI();
interval = setInterval(() => spawn(), SPEED);
if(QUESTIONS.length === 0) toast("⚠️ Добавьте вопросы!");
<\/script>
</body>
</html>`;
    }
    
    // ========== ОБНОВЛЕНИЕ ПРЕВЬЮ ==========
    function updatePreview() {
        // Сохраняем данные из форм
        for (let i = 0; i < bugs.length; i++) {
            let emojiInput = document.getElementById(`bugEmoji_${i}`);
            let nameInput = document.getElementById(`bugName_${i}`);
            if (emojiInput && nameInput) {
                bugs[i].emoji = emojiInput.value;
                bugs[i].name = nameInput.value;
            }
        }
        for (let i = 0; i < questions.length; i++) {
            let textInput = document.getElementById(`qText_${i}`);
            let answerInput = document.getElementById(`qAnswer_${i}`);
            let hintInput = document.getElementById(`qHint_${i}`);
            if (textInput && answerInput) {
                questions[i].text = textInput.value;
                questions[i].answer = answerInput.value.toLowerCase().trim();
                if (hintInput) questions[i].hint = hintInput.value;
            }
        }
        
        let html = buildGame();
        let iframe = document.getElementById('previewFrame');
        iframe.srcdoc = html;
        
        let code = `<iframe srcdoc="${html.replace(/&/g, '&amp;').replace(/"/g, '&quot;')}" width="100%" height="600" frameborder="0" style="background:transparent;display:block" allow="autoplay"></iframe>`;
        document.getElementById('codeBox').innerHTML = code;
    }
    
    function copyCode() {
        let code = document.getElementById('codeBox').innerHTML;
        navigator.clipboard.writeText(code).then(() => {
            alert('✅ Код скопирован! Вставь в Genially');
        }).catch(() => {
            alert('❌ Выдели текст вручную Ctrl+C');
        });
    }
    
    // ========== ЗАПУСК ==========
    renderTargetEmojiPanel();
    renderOtherEmojiPanel();
    renderBugsList();
    renderQuestionsList();
    updatePreview();
    
    // События
    document.getElementById('targetBug').oninput = function() { renderTargetEmojiPanel(); updatePreview(); };
    document.getElementById('speed').oninput = function() { document.getElementById('speedVal').innerText = this.value + ' сек'; updatePreview(); };
    document.getElementById('bgColor').oninput = updatePreview;
    document.getElementById('bgImage').oninput = updatePreview;
    document.getElementById('gameTitle').oninput = updatePreview;
</script>
</body>
</html>
