<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поймай жука - конструктор</title>
    <style>
        body {
            font-family: Arial;
            background: #2d5a2c;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .flex {
            display: flex;
            gap: 20px;
        }
        .panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        .left {
            width: 35%;
        }
        .right {
            width: 65%;
        }
        .section {
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .section h3 {
            margin-bottom: 12px;
            color: #333;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 5px;
        }
        .bug-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .bug-row input:first-child {
            width: 60px;
            text-align: center;
            font-size: 24px;
        }
        .bug-row input:nth-child(2) {
            flex: 1;
        }
        .del-btn {
            background: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
        }
        .q-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #ff9800;
        }
        .q-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .preview-frame {
            width: 100%;
            height: 450px;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: #f0f0f0;
            margin-bottom: 15px;
        }
        .code-box {
            background: #1e1e1e;
            color: #0f0;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow: auto;
            margin: 10px 0;
            border-radius: 8px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .btn-orange {
            background: #ff9800;
            flex: 1;
        }
        .btn-blue {
            background: #2196f3;
            flex: 1;
        }
        .hint-text {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🐞 ПОЙМАЙ НАСЕКОМОЕ 🦋</h1>
    
    <div class="flex">
        <!-- ЛЕВАЯ ПАНЕЛЬ -->
        <div class="panel left">
            <div class="section">
                <h3>🎯 КОГО ЛОВИМ?</h3>
                <input type="text" id="targetBug" value="🐞" style="font-size: 24px; text-align: center;">
            </div>
            
            <div class="section">
                <h3>🦟 ДРУГИЕ НАСЕКОМЫЕ</h3>
                <div id="bugsList"></div>
                <button onclick="addBug()">+ Добавить насекомое</button>
                <div class="hint-text">⚠️ При клике на них — теряешь жизнь</div>
            </div>
            
            <div class="section">
                <h3>❓ ВОПРОСЫ</h3>
                <div id="questionsList"></div>
                <button onclick="addQuestion()">+ Добавить вопрос</button>
            </div>
            
            <div class="section">
                <h3>⚙️ НАСТРОЙКИ</h3>
                <label>Скорость появления (сек)</label>
                <input type="range" id="speedRange" min="0.5" max="3" step="0.1" value="1.5">
                <span id="speedValue">1.5 сек</span>
                
                <label style="margin-top: 10px;">Фон игры</label>
                <input type="color" id="bgColor" value="#87CEEB">
                
                <label style="margin-top: 10px;">Название игры</label>
                <input type="text" id="gameTitle" value="🐞 ПОЙМАЙ ЖУКА! 🐞">
            </div>
        </div>
        
        <!-- ПРАВАЯ ПАНЕЛЬ -->
        <div class="panel right">
            <h3>👁️ ПРЕДПРОСМОТР</h3>
            <iframe id="previewFrame" class="preview-frame"></iframe>
            
            <div class="btn-row">
                <button class="btn-orange" onclick="updatePreview()">🔄 ОБНОВИТЬ</button>
                <button class="btn-blue" onclick="copyCode()">📋 КОПИРОВАТЬ КОД</button>
            </div>
            
            <h3>📦 КОД ДЛЯ GENIALLY</h3>
            <div id="codeBox" class="code-box">Нажми "Обновить"</div>
            <div class="hint-text">✅ В Genially: Вставить → HTML-код → вставь код</div>
        </div>
    </div>
</div>

<script>
    // НАЧАЛЬНЫЕ ДАННЫЕ
    let bugsData = [
        { emoji: "🦟", name: "Комар" },
        { emoji: "🕷️", name: "Паук" }
    ];
    
    let questionsData = [
        { text: "Назови столицу Франции?", answer: "париж", hint: "Город любви" }
    ];
    
    // ОТРИСОВКА СПИСКА НАСЕКОМЫХ
    function renderBugs() {
        let container = document.getElementById('bugsList');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < bugsData.length; i++) {
            let div = document.createElement('div');
            div.className = 'bug-row';
            div.innerHTML = `
                <input type="text" class="bug-emoji" data-index="${i}" value="${bugsData[i].emoji}">
                <input type="text" class="bug-name" data-index="${i}" value="${bugsData[i].name}">
                <button class="del-btn" onclick="deleteBug(${i})">🗑️</button>
            `;
            container.appendChild(div);
        }
        
        // Привязываем события для редактирования
        document.querySelectorAll('.bug-emoji').forEach(inp => {
            inp.oninput = function() {
                let idx = parseInt(this.dataset.index);
                bugsData[idx].emoji = this.value;
                updatePreview();
            };
        });
        document.querySelectorAll('.bug-name').forEach(inp => {
            inp.oninput = function() {
                let idx = parseInt(this.dataset.index);
                bugsData[idx].name = this.value;
                updatePreview();
            };
        });
    }
    
    function deleteBug(index) {
        bugsData.splice(index, 1);
        renderBugs();
        updatePreview();
    }
    
    function addBug() {
        bugsData.push({ emoji: "🦟", name: "Новое насекомое" });
        renderBugs();
        updatePreview();
    }
    
    // ОТРИСОВКА ВОПРОСОВ
    function renderQuestions() {
        let container = document.getElementById('questionsList');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < questionsData.length; i++) {
            let div = document.createElement('div');
            div.className = 'q-item';
            div.innerHTML = `
                <div class="q-header">
                    <strong>Вопрос ${i+1}</strong>
                    <button class="del-btn" onclick="deleteQuestion(${i})">🗑️</button>
                </div>
                <label>Текст вопроса</label>
                <textarea class="q-text" data-index="${i}" rows="2">${escapeHtml(questionsData[i].text)}</textarea>
                <label>Правильный ответ</label>
                <input type="text" class="q-answer" data-index="${i}" value="${escapeHtml(questionsData[i].answer)}">
                <label>Подсказка</label>
                <input type="text" class="q-hint" data-index="${i}" value="${escapeHtml(questionsData[i].hint)}">
            `;
            container.appendChild(div);
        }
        
        document.querySelectorAll('.q-text').forEach(ta => {
            ta.oninput = function() {
                let idx = parseInt(this.dataset.index);
                questionsData[idx].text = this.value;
                updatePreview();
            };
        });
        document.querySelectorAll('.q-answer').forEach(inp => {
            inp.oninput = function() {
                let idx = parseInt(this.dataset.index);
                questionsData[idx].answer = this.value.toLowerCase().trim();
                updatePreview();
            };
        });
        document.querySelectorAll('.q-hint').forEach(inp => {
            inp.oninput = function() {
                let idx = parseInt(this.dataset.index);
                questionsData[idx].hint = this.value;
                updatePreview();
            };
        });
    }
    
    function deleteQuestion(index) {
        questionsData.splice(index, 1);
        renderQuestions();
        updatePreview();
    }
    
    function addQuestion() {
        questionsData.push({ text: "Новый вопрос", answer: "ответ", hint: "подсказка" });
        renderQuestions();
        updatePreview();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;');
        });
    }
    
    // ГЕНЕРАЦИЯ HTML ИГРЫ
    function generateGame() {
        let target = document.getElementById('targetBug').value;
        let speed = parseFloat(document.getElementById('speedRange').value);
        let bg = document.getElementById('bgColor').value;
        let title = document.getElementById('gameTitle').value;
        
        let bugs = bugsData.filter(b => b.emoji && b.emoji.trim());
        let questions = questionsData.filter(q => q.text && q.text.trim());
        
        let speedMs = speed * 1000;
        
        return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поймай жука</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial;}
.game{width:100%;max-width:600px;background:${bg};border-radius:30px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.2);}
.header{background:rgba(0,0,0,0.7);color:white;padding:12px;display:flex;justify-content:space-between;align-items:center;}
.score{background:#ff9800;padding:5px 12px;border-radius:20px;}
.lives{font-size:20px;}
.reset{background:#ff9800;border:none;padding:5px 12px;border-radius:20px;cursor:pointer;color:white;}
.field{position:relative;height:450px;overflow:hidden;cursor:crosshair;}
.bug{position:absolute;font-size:55px;cursor:pointer;animation:wobble 0.2s infinite;}
@keyframes wobble{0%,100%{transform:rotate(0);}50%{transform:rotate(10deg);}}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000;}
.modal-box{background:white;max-width:350px;width:90%;border-radius:30px;padding:20px;text-align:center;}
.qtext{background:#f5f5f5;padding:15px;border-radius:20px;margin:15px 0;}
.answer{width:100%;padding:10px;border:1px solid #ddd;border-radius:30px;margin:10px 0;}
.btn{background:#4caf50;color:white;border:none;padding:8px 20px;border-radius:30px;cursor:pointer;margin:5px;}
.close{background:#ff9800;}
.feedback{margin:10px 0;padding:8px;border-radius:20px;}
.good{background:#c8e6c9;color:green;}
.bad{background:#ffcdd2;color:red;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#b71c1c;color:white;padding:8px 16px;border-radius:30px;z-index:2000;animation:fade 2s forwards;}
@keyframes fade{0%{opacity:1;}70%{opacity:1;}100%{opacity:0;}}
.end{text-align:center;padding:60px 20px;}
.end h2{margin-bottom:15px;}
</style>
</head>
<body>
<div class="game">
<div class="header">
<span>${escapeHtml(title)}</span>
<span class="score">🎯 <span id="scoreVal">0</span></span>
<span class="lives" id="livesVal">❤️❤️❤️</span>
<button class="reset" id="resetBtn">🔄 Новая</button>
</div>
<div class="field" id="field"></div>
</div>
<div id="modal" class="modal">
<div class="modal-box">
<h3>📖 ВОПРОС</h3>
<div class="qtext" id="qText">...</div>
<input type="text" id="answerInput" class="answer" placeholder="Введи ответ">
<div>
<button class="btn" id="submitBtn">✅ ОТВЕТИТЬ</button>
<button class="btn close" id="closeBtn">❌ ЗАКРЫТЬ</button>
</div>
<div id="feedbackMsg" class="feedback"></div>
<div id="hintMsg" style="font-size:12px;color:#888;">💡 Подсказка: ...</div>
</div>
</div>
<script>
const TARGET = "${escapeHtml(target)}";
const QUESTIONS = ${JSON.stringify(questions)};
const OTHERS = ${JSON.stringify(bugs)};
const SPEED = ${speedMs};

let score = 0, lives = 3, active = true, qIndex = 0, interval = null;

function toast(msg, good) {
let t = document.createElement('div');
t.className = 'toast';
t.textContent = msg;
if(good) t.style.background = '#4caf50';
document.body.appendChild(t);
setTimeout(() => t.remove(), 2000);
}

function updateUI() {
document.getElementById('scoreVal').innerText = score;
let hearts = '';
for(let i=0;i<lives;i++) hearts += '❤️';
for(let i=lives;i<3;i++) hearts += '🖤';
document.getElementById('livesVal').innerText = hearts;
}

function spawn() {
if(!active) return;
let field = document.getElementById('field');
let isTarget = Math.random() < 0.4;
let bug = document.createElement('div');
bug.className = 'bug';
if(isTarget) {
bug.textContent = TARGET;
bug.dataset.type = 'target';
} else {
let r = OTHERS[Math.floor(Math.random() * OTHERS.length)];
bug.textContent = r.emoji;
bug.dataset.type = 'bad';
}
let w = field.clientWidth - 70;
let h = field.clientHeight - 70;
bug.style.left = Math.random() * Math.max(0, w) + 'px';
bug.style.top = Math.random() * Math.max(0, h) + 'px';
bug.onclick = function(e) {
e.stopPropagation();
if(!active) return;
if(this.dataset.type === 'target') {
this.remove();
openModal();
} else {
this.remove();
lives--;
updateUI();
toast("❌ Не то! -1 жизнь");
if(lives <= 0) gameOver();
}
};
field.appendChild(bug);
setTimeout(() => { if(bug.parentNode) bug.remove(); }, 3000);
}

function openModal() {
if(!active) return;
if(qIndex >= QUESTIONS.length) { win(); return; }
let q = QUESTIONS[qIndex];
document.getElementById('qText').innerHTML = q.text;
document.getElementById('hintMsg').innerHTML = '💡 ' + (q.hint || 'нет');
document.getElementById('answerInput').value = '';
document.getElementById('feedbackMsg').innerHTML = '';
document.getElementById('modal').style.display = 'flex';
}

function check() {
let ans = document.getElementById('answerInput').value.trim().toLowerCase();
let q = QUESTIONS[qIndex];
let fb = document.getElementById('feedbackMsg');
if(ans === q.answer.toLowerCase()) {
fb.innerHTML = '✅ ВЕРНО! +10 очков';
fb.className = 'feedback good';
score += 10;
updateUI();
qIndex++;
setTimeout(() => {
document.getElementById('modal').style.display = 'none';
toast("✅ +10 очков!", true);
if(qIndex >= QUESTIONS.length) win();
}, 800);
} else {
fb.innerHTML = '❌ НЕВЕРНО! Ответ "' + ans + '" неправильный';
fb.className = 'feedback bad';
document.getElementById('answerInput').value = '';
}
}

function closeModal() {
document.getElementById('modal').style.display = 'none';
}

function gameOver() {
active = false;
if(interval) clearInterval(interval);
let field = document.getElementById('field');
field.innerHTML = '<div class="end"><h2>💀 ИГРА ОКОНЧЕНА 💀</h2><p>Счёт: ' + score + '</p><button onclick="location.reload()">🔄 Снова</button></div>';
toast("💀 Игра окончена!");
}

function win() {
active = false;
if(interval) clearInterval(interval);
let field = document.getElementById('field');
field.innerHTML = '<div class="end"><h2>🏆 ПОБЕДА! 🏆</h2><p>Счёт: ' + score + '</p><button onclick="location.reload()">🔄 Снова</button></div>';
toast("🏆 ПОБЕДА!", true);
}

function reset() {
score = 0; lives = 3; qIndex = 0; active = true;
updateUI();
document.getElementById('field').innerHTML = '';
if(interval) clearInterval(interval);
interval = setInterval(() => spawn(), SPEED);
}

document.getElementById('submitBtn').onclick = check;
document.getElementById('closeBtn').onclick = closeModal;
document.getElementById('resetBtn').onclick = reset;
document.getElementById('answerInput').onkeypress = (e) => { if(e.key === 'Enter') check(); };
document.getElementById('modal').onclick = (e) => { if(e.target === this) closeModal(); };

updateUI();
interval = setInterval(() => spawn(), SPEED);
if(QUESTIONS.length === 0) toast("⚠️ Добавьте вопросы!");
<\/script>
</body>
</html>`;
    }
    
    // ОБНОВЛЕНИЕ ПРЕВЬЮ
    function updatePreview() {
        let html = generateGame();
        let iframe = document.getElementById('previewFrame');
        iframe.srcdoc = html;
        
        let code = `<iframe srcdoc="${html.replace(/&/g, '&amp;').replace(/"/g, '&quot;')}" width="100%" height="600" frameborder="0" style="background:transparent;display:block" allow="autoplay"></iframe>`;
        document.getElementById('codeBox').innerHTML = code;
    }
    
    // КОПИРОВАНИЕ
    function copyCode() {
        let code = document.getElementById('codeBox').innerHTML;
        navigator.clipboard.writeText(code).then(() => {
            alert('✅ Код скопирован! Вставь в Genially через "Вставить HTML"');
        }).catch(() => {
            alert('❌ Выдели текст вручную Ctrl+C');
        });
    }
    
    // ОБНОВЛЕНИЕ СКОРОСТИ
    document.getElementById('speedRange').oninput = function() {
        document.getElementById('speedValue').innerText = this.value + ' сек';
        updatePreview();
    };
    
    // СОБЫТИЯ
    document.getElementById('targetBug').oninput = updatePreview;
    document.getElementById('bgColor').oninput = updatePreview;
    document.getElementById('gameTitle').oninput = updatePreview;
    
    // ЗАПУСК
    renderBugs();
    renderQuestions();
    updatePreview();
</script>
</body>
</html>
